apiVersion: apps/v1
kind: Deployment
metadata:  
  name: nginx-dm
spec:  
  replicas: 2 
  selector:
    matchLabels:
      name: nginx 
  template:    
    metadata:      
      labels:        
        name: nginx    
    spec:      
      containers:        
      - name: nginx          
        image: nginx:1.7.9          
        imagePullPolicy: IfNotPresent          
        ports:            
        - containerPort: 80
            
---
apiVersion: v1
kind: Service
metadata:  
  name: nginx-svc
spec:  
  ports:    
  - port: 80      
    targetPort: 80      
    protocol: TCP  
  selector:    
    name: nginx
    
